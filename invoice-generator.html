<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator - Wayze</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BBC2377YZF"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-BBC2377YZF');
</script>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; font-weight:600; }

/* CONTAINER */
.container {
    max-width:800px;
    width:95%;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* GRID */
.form-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}
.full { grid-column: span 2; }

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:600;
}
button:hover { opacity:0.9; }

/* ITEMS */
.item {
    display:grid;
    grid-template-columns:2fr 1fr 1fr auto;
    gap:10px;
    margin-bottom:10px;
}
.remove-btn {
    padding:6px;
    border-radius:8px;
    font-size:12px;
}

/* INVOICE */
.invoice {
    display:none;
    max-width:900px;
    width:95%;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* HEADER */
.invoice-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}
#invLogo { max-height:80px; }

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
th, td {
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
th { background:#f5f5f5; }

/* TOTAL */
.total {
    text-align:right;
    font-weight:bold;
    margin-top:8px;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
}

/* PRINT */
@media print {
    body * { visibility:hidden; }
    .invoice, .invoice * { visibility:visible; }

    .invoice {
        position:absolute;
        top:0;
        left:0;
        width:100%;
    }

    .no-print { display:none !important; }
}

/* MOBILE */
@media(max-width:600px){
    .form-grid { grid-template-columns:1fr; }
    .full { grid-column: span 1; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- FORM -->
<div class="container">
<h2>🧾 Invoice Generator</h2>

<div class="form-grid">

<div class="full">
<label>Company Logo</label>
<input type="file" id="logo">
</div>

<div>
<label>Business Name</label>
<input type="text" id="business">
</div>

<div>
<label>Business Phone</label>
<input type="text" id="phone">
</div>

<div class="full">
<label>Business Address</label>
<input type="text" id="address">
</div>

<div>
<label>Client Name</label>
<input type="text" id="client">
</div>

<div>
<label>Client Phone</label>
<input type="text" id="clientPhone">
</div>

<div class="full">
<label>Client Address</label>
<input type="text" id="clientAddress">
</div>

<div>
<label>Invoice Number</label>
<input type="text" id="invoiceNo">
</div>

<div>
<label>Date</label>
<input type="date" id="date">
</div>

</div>

<h3>Items</h3>

<div id="items">
<div class="item">
<input type="text" placeholder="Item Name">
<input type="number" placeholder="Price">
<input type="number" placeholder="Qty">
<button class="remove-btn" onclick="removeItem(this)">❌</button>
</div>
</div>

<button onclick="addItem()">➕ Add Item</button>

<label>GST (%)</label>
<input type="number" id="gst">

<button onclick="generateInvoice()">⚡ Generate Invoice</button>

</div>

<!-- INVOICE -->
<div class="invoice" id="invoice">

<div class="invoice-header">
<img id="invLogo" style="display:none;">
<div>
<h2 id="invBusiness"></h2>
<div id="invAddress"></div>
<div id="invPhone"></div>
</div>
</div>

<hr>

<b>Bill To:</b><br>
<span id="invClient"></span><br>
<span id="invClientAddress"></span><br>
<span id="invClientPhone"></span>

<div style="text-align:right;">
Invoice #: <span id="invNo"></span><br>
Date: <span id="invDate"></span>
</div>

<table>
<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody id="invoiceItems"></tbody>
</table>

<div class="total" id="subtotal"></div>
<div class="total" id="gstAmount"></div>
<div class="total" id="grandTotal"></div>

<button class="no-print" onclick="window.print()">🧾 Print / Save PDF</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function addItem() {
    let div = document.createElement("div");
    div.classList.add("item");

    div.innerHTML = `
        <input type="text" placeholder="Item Name">
        <input type="number" placeholder="Price">
        <input type="number" placeholder="Qty">
        <button class="remove-btn" onclick="removeItem(this)">❌</button>
    `;

    document.getElementById("items").appendChild(div);
}

function removeItem(btn) {
    btn.parentElement.remove();
}

function generateInvoice() {

    let items = document.querySelectorAll("#items .item");
    let tableHTML = "";
    let subtotal = 0;

    items.forEach(item => {
        let name = item.children[0].value;
        let price = parseFloat(item.children[1].value);
        let qty = parseFloat(item.children[2].value);

        if (!name || !price || !qty) return;

        let total = price * qty;
        subtotal += total;

        tableHTML += `
        <tr>
            <td>${name}</td>
            <td>₹ ${price}</td>
            <td>${qty}</td>
            <td>₹ ${total.toFixed(2)}</td>
        </tr>`;
    });

    let gst = parseFloat(document.getElementById("gst").value) || 0;
    let gstAmount = subtotal * gst / 100;
    let grandTotal = subtotal + gstAmount;

    document.getElementById("invoiceItems").innerHTML = tableHTML;

    document.getElementById("subtotal").innerText = "Subtotal: ₹ " + subtotal.toFixed(2);
    document.getElementById("gstAmount").innerText = "GST: ₹ " + gstAmount.toFixed(2);
    document.getElementById("grandTotal").innerText = "Grand Total: ₹ " + grandTotal.toFixed(2);

    document.getElementById("invBusiness").innerText = document.getElementById("business").value;
    document.getElementById("invAddress").innerText = document.getElementById("address").value;
    document.getElementById("invPhone").innerText = "Phone: " + document.getElementById("phone").value;

    document.getElementById("invClient").innerText = document.getElementById("client").value;
    document.getElementById("invClientAddress").innerText = document.getElementById("clientAddress").value;
    document.getElementById("invClientPhone").innerText = "Phone: " + document.getElementById("clientPhone").value;

    document.getElementById("invNo").innerText = document.getElementById("invoiceNo").value;
    document.getElementById("invDate").innerText = document.getElementById("date").value;

    let logoInput = document.getElementById("logo");
    let logoImg = document.getElementById("invLogo");

    if (logoInput.files.length > 0) {
        let reader = new FileReader();
        reader.onload = function(e) {
            logoImg.src = e.target.result;
            logoImg.style.display = "block";
        };
        reader.readAsDataURL(logoInput.files[0]);
    }

    document.getElementById("invoice").style.display = "block";
}
</script>

</body>
</html>
