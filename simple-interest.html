<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Interest Calculator - Wayze</title>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BBC2377YZF"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}

.navbar a {
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* CONTAINER */
.container {
    max-width:600px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width:100%;
    margin-top:12px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* TABLE */
table {
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
}

th, td {
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}

button:hover {
    background:#5a6edc;
}

/* PRINT BUTTON FIX */
button.print-btn {
    background:#667eea !important;
    color:white !important;
}

button.print-btn:hover {
    background:#5a6edc !important;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* PRINT */
.print-area { margin-top:15px; }
.print-title { display:none; }

@media print {
    body * { visibility:hidden; }
    .print-area, .print-area * { visibility:visible; }
    .print-area { position:absolute; top:0; left:0; width:100%; padding:10px; }
    .print-title { display:block; text-align:center; font-size:22px; font-weight:bold; margin-bottom:15px; }
    input, button, .no-print, .navbar, .footer { display:none !important; }
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>💰 Simple Interest Calculator</h2>

<input type="number" id="principal" placeholder="Principal Amount (₹)">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="time" placeholder="Time (Years)">

<div class="print-area">
<h2 class="print-title">Interest Report</h2>

<table>
<thead>
<tr>
<th>Details</th>
<th>Value</th>
</tr>
</thead>
<tbody id="resultTable"></tbody>
</table>
</div>

<button class="no-print" onclick="calculateSI()">Calculate</button>
<button class="no-print print-btn" onclick="window.print()">Print / Save PDF</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function calculateSI(){
    let P = parseFloat(document.getElementById("principal").value);
    let R = parseFloat(document.getElementById("rate").value);
    let T = parseFloat(document.getElementById("time").value);

    if(isNaN(P) || isNaN(R) || isNaN(T)){
        alert("Please enter all values");
        return;
    }

    let SI = (P * R * T) / 100;
    let total = P + SI;

    document.getElementById("resultTable").innerHTML = `
        <tr><td>Principal</td><td>₹ ${P.toFixed(2)}</td></tr>
        <tr><td>Rate</td><td>${R}%</td></tr>
        <tr><td>Time</td><td>${T} Years</td></tr>
        <tr><td>Interest</td><td>₹ ${SI.toFixed(2)}</td></tr>
        <tr><td><b>Total Amount</b></td><td><b>₹ ${total.toFixed(2)}</b></td></tr>
    `;
}
</script>

</body>
</html>
