<html lang="en">
<head>
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; font-weight:600; }

/* CONTAINER */
.container {
    flex:1;
    max-width:500px;
    width:90%;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:12px;
    border-radius:8px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* QR BOX */
#qrcode {
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#f4f4f4;
    display:inline-block;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
   <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>📱 QR Code Generator</h2>

<input type="text" id="textInput" placeholder="Enter text or URL">

<button onclick="generateQRCode()">⚡ Generate QR Code</button>

<div id="qrcode"></div>

<button onclick="copyQR()">📋 Copy QR</button>
<button onclick="downloadQR()">⬇️ Download QR</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<!-- QR LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
let qrCanvas = null;

function generateQRCode() {
    const text = document.getElementById('textInput').value.trim();

    if (!text) {
        alert("Enter text or URL");
        return;
    }

    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = "";

    const qr = new QRCode(qrDiv, {
        text: text,
        width: 200,
        height: 200
    });

    // force canvas capture after render
    setTimeout(() => {
        qrCanvas = qrDiv.querySelector("canvas");
    }, 200);
}

/* COPY */
async function copyQR() {
    if (!qrCanvas) {
        alert("Generate QR first!");
        return;
    }

    try {
        const blob = await new Promise(resolve => qrCanvas.toBlob(resolve));
        await navigator.clipboard.write([
            new ClipboardItem({ [blob.type]: blob })
        ]);
        alert("QR copied!");
    } catch {
        alert("Copy not supported. Use download.");
    }
}

/* DOWNLOAD */
function downloadQR() {
    if (!qrCanvas) {
        alert("Generate QR first!");
        return;
    }

    const url = qrCanvas.toDataURL("image/png");

    const a = document.createElement("a");
    a.href = url;
    a.download = "wayze-qr.png";
    a.click();
}
</script>

</body>
</html>
