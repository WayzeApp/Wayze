<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator - Wayze</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background: #111;
    padding: 15px 20px;
    color:white;
    font-weight:600;
}
.navbar a { color:white; text-decoration:none; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.container {
    width:100%;
    max-width:520px;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE WITH EMOJI */
h2 {
    font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
    margin-bottom:20px;
}

/* INPUT & SELECT */
input, select {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:16px;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* RESULT */
.result {
    margin-top:15px;
    text-align:left;
    line-height:1.6;
    font-weight:600;
    border:1px solid #ccc;
    padding:15px;
    border-radius:8px;
    background:#f9f9f9;
    font-family: monospace;
    word-break: break-all;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
}

/* MOBILE */
@media(max-width:768px){
    .container { margin:0 10px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

<h2>🔐 Hash Generator</h2>

<input type="text" id="textInput" placeholder="Enter text to hash">
<select id="algorithm">
    <option value="MD5">MD5</option>
    <option value="SHA-1">SHA-1</option>
    <option value="SHA-256" selected>SHA-256</option>
</select>
<button onclick="generateHash()">Generate Hash</button>

<div class="result" id="result"></div>
<button onclick="copyHash()">Copy Hash</button>

</div>
</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<!-- JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
<script>
async function generateHash() {
    const text = document.getElementById('textInput').value;
    const algo = document.getElementById('algorithm').value;
    const resultDiv = document.getElementById('result');

    if (!text.trim()) {
        alert("Please enter text to hash.");
        return;
    }

    if (algo === "MD5") {
        resultDiv.innerText = md5(text);
    } else {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        let hashBuffer;
        if (algo === "SHA-1") hashBuffer = await crypto.subtle.digest('SHA-1', data);
        else if (algo === "SHA-256") hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
        resultDiv.innerText = hashHex;
    }
}

function copyHash() {
    const hash = document.getElementById('result').innerText;
    if (!hash) { alert("Nothing to copy!"); return; }
    navigator.clipboard.writeText(hash).then(() => alert("Hash copied to clipboard!"));
}
</script>

</body>
</html>
