<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* { box-sizing:border-box; }

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CONTAINER */
.container {
    width:100%;
    max-width:600px;
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* INPUT */
input, select {
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin-top:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

.copy-btn {
    background:#28a745;
}
.copy-btn:hover {
    background:#218838;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
th, td {
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

/* PRINT */
.print-area { margin-top:15px; }
.print-title { display:none; }

@media print {
    body * { visibility:hidden; }

    .print-area, .print-area * {
        visibility:visible;
    }

    .print-area {
        position:absolute;
        top:0;
        left:0;
        width:100%;
        padding:10px;
    }

    .print-title {
        display:block;
        font-size:22px;
        font-weight:bold;
        margin-bottom:15px;
        text-align:center;
    }

    input, button, .navbar, .footer {
        display:none !important;
    }
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* MOBILE */
@media(max-width:768px){
    .container { margin:0 10px; }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

<h2>🎟️ Coupon Code Generator</h2>

<input type="text" id="prefix" placeholder="Prefix (Optional) e.g., SALE">

<select id="length">
<option value="6">6 Characters</option>
<option value="8" selected>8 Characters</option>
<option value="10">10 Characters</option>
<option value="12">12 Characters</option>
</select>

<input type="number" id="count" placeholder="Number of Codes" value="5">

<div class="print-area">
<h2 class="print-title">Coupon Codes</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Coupon Code</th>
</tr>
</thead>
<tbody id="resultTable"></tbody>
</table>
</div>

<button onclick="generateCoupons()">Generate Codes</button>
<button class="copy-btn" onclick="copyAll()">Copy All</button>
<button onclick="window.print()">Print / Save PDF</button>

</div>
</div>

<script>

function randomCode(length){
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let result = "";
    for(let i=0;i<length;i++){
        result += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    return result;
}

function generateCoupons(){
    let prefix = document.getElementById("prefix").value.toUpperCase();
    let length = parseInt(document.getElementById("length").value);
    let count = parseInt(document.getElementById("count").value);

    if(isNaN(count) || count <= 0){
        alert("Enter valid count");
        return;
    }

    let html = "";

    for(let i=1;i<=count;i++){
        let code = randomCode(length);
        if(prefix){
            code = prefix + "-" + code;
        }

        html += `<tr><td>${i}</td><td>${code}</td></tr>`;
    }

    document.getElementById("resultTable").innerHTML = html;
}

function copyAll(){
    let rows = document.querySelectorAll("#resultTable tr");
    let text = "";

    rows.forEach(row=>{
        text += row.children[1].innerText + "\n";
    });

    navigator.clipboard.writeText(text);
    alert("Copied to clipboard!");
}

</script>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

</body>
</html>
