<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Assistant - Wayze</title>

<style>
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:#333;
}
.navbar {
    display: flex;
    justify-content: space-between;
    background:#111;
    color:white;
    padding:15px 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}
.navbar a { color:white; text-decoration:none; font-weight:bold; }

.container {
    flex:1;
    max-width:600px;
    margin:30px auto;
    background:white;
    border-radius:10px;
    padding:20px;
    display:flex;
    flex-direction:column;
    height:70vh;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
.chat-window {
    flex:1;
    overflow-y:auto;
    border:1px solid #ccc;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    display:flex;
    flex-direction:column;
    gap:5px;
}
.chat-message { padding:8px 12px; border-radius:10px; max-width:80%; position:relative; }
.user { background:#667eea; color:white; align-self:flex-end; }
.ai { background:#f1f1f1; color:#333; align-self:flex-start; }

.chat-message button {
    background:#5a6edc;
    color:white;
    border:none;
    border-radius:5px;
    padding:3px 6px;
    font-size:12px;
    cursor:pointer;
    position:absolute;
    top:5px;
    right:5px;
    display:none;
}
.chat-message:hover button { display:block; }

input { padding:10px; width:calc(100% - 80px); border-radius:6px; border:1px solid #ccc; }
button#sendBtn { padding:10px; width:60px; border:none; border-radius:6px; background:#667eea; color:white; cursor:pointer; }

footer { background:#111; color:white; padding:20px; text-align:center; border-top:2px solid #333; font-size:14px; }
footer a { color:#667eea; text-decoration:none; }
</style>
</head>

<body>
<div class="navbar">
    <div>🚀 Wayze</div>
    <div><a href="../index.html">Home</a></div>
</div>

<div class="container">
    <div class="chat-window" id="chatWindow"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="userInput" placeholder="Type your message" title="Type your question or message">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// Your real OpenAI API key
const OPENAI_API_KEY = "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";

async function sendMessage(){
    const input = document.getElementById("userInput");
    const msg = input.value.trim();
    if(!msg) return;

    const chat = document.getElementById("chatWindow");

    // Show user message
    const userDiv = document.createElement("div");
    userDiv.className = "chat-message user";
    userDiv.innerText = msg;
    chat.appendChild(userDiv);

    // Show AI placeholder
    const aiDiv = document.createElement("div");
    aiDiv.className = "chat-message ai";
    aiDiv.innerText = "Typing...";
    chat.appendChild(aiDiv);
    chat.scrollTop = chat.scrollHeight;

    try {
        // OpenAI API call
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
                model:"gpt-3.5-turbo",
                messages:[{role:"user", content: msg}],
                max_tokens: 300
            })
        });

        const data = await response.json();
        const aiText = data.choices[0].message.content.trim();

        aiDiv.innerText = aiText;

        // Copy button
        const copyBtn = document.createElement("button");
        copyBtn.innerText = "📋 Copy";
        copyBtn.onclick = ()=>{ navigator.clipboard.writeText(aiText); alert("AI response copied! ✅"); };
        aiDiv.appendChild(copyBtn);

        chat.scrollTop = chat.scrollHeight;
    } catch(e){
        aiDiv.innerText = "⚠️ Error connecting to AI. Try again later.";
        console.error(e);
    }

    input.value = "";
}
</script>

<footer>
© 2026 Wayze | 
</footer>
</body>
</html>
