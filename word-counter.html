<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter - Wayze</title>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BBC2377YZF"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-BBC2377YZF');
</script>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}

.navbar a {
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* CONTAINER */
.container {
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TEXTAREA */
textarea {
    width:100%;
    height:150px;
    margin-top:12px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-family:monospace;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}

button:hover {
    background:#5a6edc;
}

/* RESULT */
.result {
    margin-top:15px;
    border:1px solid #ccc;
    padding:12px;
    border-radius:6px;
    background:#f5f5f5;
    font-family:monospace;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>📝 Word Counter</h2>

<textarea id="text" placeholder="Type or paste your text here..." oninput="countText()"></textarea>

<div class="result" id="result">
Words: 0 | Characters: 0 | Sentences: 0
</div>

<button onclick="clearText()">Clear</button>
<button onclick="copyResult()">Copy Result</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function countText() {
    const text = document.getElementById("text").value;

    const words = text.trim().split(/\s+/).filter(w => w.length > 0);
    const wordCount = words.length;

    const charCount = text.length;

    const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
    const sentenceCount = sentences.length;

    document.getElementById("result").innerText =
        `Words: ${wordCount} | Characters: ${charCount} | Sentences: ${sentenceCount}`;
}

function clearText() {
    document.getElementById("text").value = "";
    document.getElementById("result").innerText =
        "Words: 0 | Characters: 0 | Sentences: 0";
}

function copyResult() {
    const res = document.getElementById("result").innerText;

    if (!res) {
        alert("Nothing to copy!");
        return;
    }

    navigator.clipboard.writeText(res);
    alert("Copied!");
}
</script>

</body>
</html>
