<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverse Text - Wayze</title>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BBC2377YZF"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-BBC2377YZF');

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a {
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* CONTAINER */
.container {
    max-width:600px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TEXTAREA */
textarea {
    width:100%;
    height:180px;
    margin-top:12px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-family:monospace;
    resize:vertical;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}
button:hover {
    background:#5a6edc;
}

/* RESULT */
.result {
    margin-top:15px;
    padding:12px;
    border-radius:6px;
    background:#f4f4f4;
    border:1px solid #ccc;
    font-family:monospace;
    text-align:left;
    word-break:break-all;
    max-height:140px;
    overflow-y:auto;
    white-space:pre-wrap;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>Reverse Text</h2>

<textarea id="inputText" placeholder="Enter your text here..." oninput="reverseText()"></textarea>

<div class="result" id="result">Reversed text will appear here...</div>

<button onclick="copyText()">📋 Copy Result</button>
<button onclick="clearText()">🧹 Clear</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>

function reverseText() {
    let text = document.getElementById("inputText").value;

    let reversed = text.split("").reverse().join("");

    document.getElementById("result").innerText =
        reversed || "Reversed text will appear here...";
}

function clearText() {
    document.getElementById("inputText").value = "";
    document.getElementById("result").innerText =
        "Reversed text will appear here...";
}

function copyText() {
    const text = document.getElementById("result").innerText;

    if (!text || text === "Reversed text will appear here...") {
        alert("Nothing to copy!");
        return;
    }

    navigator.clipboard.writeText(text)
        .then(() => alert("Copied!"))
        .catch(() => alert("Failed"));
}

</script>

</body>
</html>
