<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter - Wayze</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}

.navbar a {
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* CONTAINER */
.container {
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUTS */
input, select {
    width:100%;
    padding:10px;
    margin-top:12px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}

button:hover {
    background:#5a6edc;
}

/* RESULT */
.result {
    margin-top:15px;
    border:1px solid #ccc;
    padding:12px;
    border-radius:6px;
    background:#f5f5f5;
    word-break:break-word;
    font-family:monospace;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>📏 Unit Converter</h2>

<input type="number" id="value" placeholder="Enter value">

<select id="type">
    <option value="km-miles">Kilometers → Miles</option>
    <option value="miles-km">Miles → Kilometers</option>
    <option value="kg-lb">Kilograms → Pounds</option>
    <option value="lb-kg">Pounds → Kilograms</option>
</select>

<button onclick="convert()">Convert</button>

<div class="result" id="result">Result will appear here...</div>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function convert() {
    const value = parseFloat(document.getElementById("value").value);
    const type = document.getElementById("type").value;

    if (isNaN(value)) return alert("Please enter a valid number!");

    let result = 0;
    let label = "";

    switch(type) {
        case "km-miles":
            result = value * 0.621371;
            label = "Miles";
            break;
        case "miles-km":
            result = value / 0.621371;
            label = "Kilometers";
            break;
        case "kg-lb":
            result = value * 2.20462;
            label = "Pounds";
            break;
        case "lb-kg":
            result = value / 2.20462;
            label = "Kilograms";
            break;
    }

    document.getElementById("result").innerText =
        value + " → " + result.toFixed(2) + " " + label;
}
</script>

</body>
</html>
