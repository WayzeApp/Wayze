<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; font-weight:600; }

/* CONTAINER */
.container {
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input[type="text"] {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-family:monospace;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* RESULT */
.result {
    margin-top:15px;
    padding:12px;
    background:#f4f4f4;
    border-radius:8px;
    font-family:monospace;
}

/* STRENGTH */
.strength {
    margin-top:10px;
    font-weight:bold;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE (same as your generator) */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>🔐 Password Strength Checker</h2>

<label>Enter Password</label>
<input type="text" id="password" placeholder="Type your password">

<button onclick="checkStrength()">⚡ Check Strength</button>

<div class="result" id="result"></div>
<div class="strength" id="strength"></div>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>

function checkStrength() {
    const password = document.getElementById("password").value;

    if (!password) {
        alert("Enter a password!");
        return;
    }

    let score = 0;

    if (password.length >= 8) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[a-z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;

    let text = "Weak ❌";

    if (score >= 3) text = "Medium ⚠️";
    if (score >= 5) text = "Strong 💪";

    document.getElementById("result").innerText = password;
    document.getElementById("strength").innerText = "Strength: " + text;
}

</script>

</body>
</html>
