<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp Converter - Wayze</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}

.navbar a {
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* CONTAINER */
.container {
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin-top:12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-family:monospace;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}

button:hover {
    background:#5a6edc;
}

/* RESULT */
.result {
    margin-top:15px;
    border:1px solid #ccc;
    padding:12px;
    border-radius:6px;
    background:#f5f5f5;
    word-break:break-word;
    font-family:monospace;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>⏱ Timestamp Converter</h2>

<input type="number" id="timestampInput" placeholder="Enter Unix Timestamp (seconds)">
<button onclick="convertToDate()">Convert to Date</button>

<input type="text" id="dateInput" placeholder="Enter Date (YYYY-MM-DD HH:MM:SS)">
<button onclick="convertToTimestamp()">Convert to Timestamp</button>

<div class="result" id="result">Result will appear here...</div>

<button onclick="copyResult()">Copy Result</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function convertToDate() {
    const ts = document.getElementById('timestampInput').value.trim();
    if (!ts) { alert("Enter a timestamp!"); return; }

    const date = new Date(parseInt(ts) * 1000);
    if (isNaN(date.getTime())) { alert("Invalid timestamp!"); return; }

    const formatted = date.toISOString().replace('T', ' ').split('.')[0];
    document.getElementById('result').innerText = `Date: ${formatted}`;
}

function convertToTimestamp() {
    const dateStr = document.getElementById('dateInput').value.trim();
    if (!dateStr) { alert("Enter a date!"); return; }

    const date = new Date(dateStr);
    if (isNaN(date.getTime())) {
        alert("Invalid format! Use YYYY-MM-DD HH:MM:SS");
        return;
    }

    const ts = Math.floor(date.getTime() / 1000);
    document.getElementById('result').innerText = `Timestamp: ${ts}`;
}

function copyResult() {
    const res = document.getElementById('result').innerText;

    if (!res || res.includes("appear")) {
        alert("Nothing to copy!");
        return;
    }

    navigator.clipboard.writeText(res);
    alert("Copied!");
}
</script>

</body>
</html>
