<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator - Wayze</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; font-weight:600; }

/* CONTAINER */
.container {
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input[type="number"] {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* CHECKBOX */
.checkbox-container {
    text-align:left;
    margin-top:15px;
    font-size:14px;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* RESULT */
.result {
    margin-top:15px;
    padding:12px;
    background:#f4f4f4;
    border-radius:8px;
    font-family:monospace;
    word-break:break-all;
}

/* STRENGTH */
.strength {
    margin-top:10px;
    font-weight:bold;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
   <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>🔐 Password Generator</h2>

<label>Password Length</label>
<input type="number" id="length" value="12" min="4" max="64">

<div class="checkbox-container">
<input type="checkbox" id="uppercase" checked> Uppercase<br>
<input type="checkbox" id="lowercase" checked> Lowercase<br>
<input type="checkbox" id="numbers" checked> Numbers<br>
<input type="checkbox" id="symbols" checked> Symbols
</div>

<button onclick="generatePassword()">⚡ Generate Password</button>

<div class="result" id="result"></div>
<div class="strength" id="strength"></div>

<button onclick="copyPassword()">📋 Copy Password</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>

function generatePassword() {
    const length = parseInt(document.getElementById('length').value);
    const upper = document.getElementById('uppercase').checked;
    const lower = document.getElementById('lowercase').checked;
    const numbers = document.getElementById('numbers').checked;
    const symbols = document.getElementById('symbols').checked;

    const upperChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lowerChars = 'abcdefghijklmnopqrstuvwxyz';
    const numberChars = '0123456789';
    const symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    let charset = '';
    if (upper) charset += upperChars;
    if (lower) charset += lowerChars;
    if (numbers) charset += numberChars;
    if (symbols) charset += symbolChars;

    if (!charset) {
        alert("Select at least one option!");
        return;
    }

    let password = '';
    for (let i = 0; i < length; i++) {
        password += charset[Math.floor(Math.random() * charset.length)];
    }

    document.getElementById('result').innerText = password;

    checkStrength(password);
}

function checkStrength(password){
    let strengthText = "Weak ❌";

    if(password.length > 10) strengthText = "Medium ⚠️";
    if(password.length > 14 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)){
        strengthText = "Strong 💪";
    }

    document.getElementById('strength').innerText = "Strength: " + strengthText;
}

function copyPassword() {
    const password = document.getElementById('result').innerText;

    if (!password) {
        alert("Nothing to copy!");
        return;
    }

    navigator.clipboard.writeText(password)
        .then(() => alert("Copied!"))
        .catch(() => alert("Failed"));
}

</script>

</body>
</html>
