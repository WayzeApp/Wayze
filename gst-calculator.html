<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator - Wayze</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; }

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; font-weight:600; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.container {
    width:100%;
    max-width:520px;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE WITH EMOJI */
h2 {
    font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
}

/* INPUT & SELECT */
input, select {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:16px;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin:12px 0;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* RESULT */
.result {
    margin-top:15px;
    text-align:left;
    line-height:1.6;
    font-weight:600;
}

.highlight { color:#667eea; }

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* MOBILE */
@media(max-width:768px){
    .container { margin:0 10px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

<h2>💹 GST Calculator</h2>

<input type="number" id="amount" placeholder="Enter Amount (₹)">

<select id="gst">
    <option value="5">5%</option>
    <option value="12">12%</option>
    <option value="18">18%</option>
    <option value="28">28%</option>
</select>

<select id="type">
    <option value="add">Add GST</option>
    <option value="remove">Remove GST</option>
</select>

<button onclick="calculateGST()">Calculate</button>

<div class="result" id="gstAmount"></div>
<div class="result" id="totalAmount"></div>

</div>
</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function calculateGST() {
    let amount = parseFloat(document.getElementById("amount").value);
    let gst = parseFloat(document.getElementById("gst").value);
    let type = document.getElementById("type").value;

    if (!amount) {
        document.getElementById("gstAmount").innerHTML = "⚠️ Enter valid amount";
        document.getElementById("totalAmount").innerHTML = "";
        return;
    }

    let gstValue, total;
    if (type === "add") {
        gstValue = (amount * gst) / 100;
        total = amount + gstValue;
    } else {
        gstValue = amount - (amount / (1 + gst / 100));
        total = amount - gstValue;
    }

    document.getElementById("gstAmount").innerHTML =
        `💰 GST Amount: <span class="highlight">₹ ${gstValue.toFixed(2)}</span>`;
    document.getElementById("totalAmount").innerHTML =
        `💳 Total Amount: <span class="highlight">₹ ${total.toFixed(2)}</span>`;
}
</script>

</body>
</html>
