<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator - Wayze</title>

<style>

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a {
    color:white;
    text-decoration:none;
}

/* MAIN */
.main {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* CARD */
.container {
    width:100%;
    max-width:500px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin-top:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
button:hover {
    background:#5a6edc;
}

/* RESULT */
.result {
    margin-top:15px;
    font-size:18px;
    font-weight:600;
}

/* CATEGORY COLORS */
.under { color:#3498db; }
.normal { color:#2ecc71; }
.over { color:#f39c12; }
.obese { color:#e74c3c; }

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* MOBILE */
@media(max-width:768px){
    .container {
        margin:0 10px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="container">

        <h2>BMI Calculator</h2>

        <input type="number" id="weight" placeholder="Weight (kg)">
        <input type="number" id="height" placeholder="Height (cm)">

        <button onclick="calculateBMI()">Calculate BMI</button>

        <div class="result" id="bmi"></div>
        <div class="result" id="status"></div>

    </div>
</div>

<script>
function calculateBMI() {
    let weight = parseFloat(document.getElementById("weight").value);
    let height = parseFloat(document.getElementById("height").value);

    if (!weight || !height) {
        document.getElementById("bmi").innerText = "⚠️ Enter valid values";
        document.getElementById("status").innerText = "";
        return;
    }

    let heightInMeters = height / 100;
    let bmi = weight / (heightInMeters * heightInMeters);

    let category = "";
    let className = "";

    if (bmi < 18.5) {
        category = "Underweight";
        className = "under";
    }
    else if (bmi < 25) {
        category = "Normal weight";
        className = "normal";
    }
    else if (bmi < 30) {
        category = "Overweight";
        className = "over";
    }
    else {
        category = "Obese";
        className = "obese";
    }

    document.getElementById("bmi").innerText = `Your BMI: ${bmi.toFixed(2)}`;
    
    let statusEl = document.getElementById("status");
    statusEl.innerText = `Category: ${category}`;
    statusEl.className = "result " + className;
}
</script>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

</body>
</html>
