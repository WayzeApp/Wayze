<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Remover - Wayze</title>

<style>

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a {
    color:white;
    text-decoration:none;
}

/* MAIN */
.main {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* CARD */
.container {
    width:100%;
    max-width:500px;
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

/* BUTTON */
button {
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:8px;
    border:none;
    background:#667eea;
    color:white;
    cursor:pointer;
    font-weight:600;
}
button:hover {
    background:#5a6edc;
}

/* STATUS */
#status {
    margin-top:10px;
    font-weight:600;
    font-size:14px;
}

/* CANVAS */
canvas {
    max-width:100%;
    margin-top:15px;
    border-radius:10px;
    background:#f0f0f0;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* MOBILE */
@media(max-width:768px){
    .container {
        margin:0 10px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="container">

        <h2>🖼️ Background Remover</h2>

        <input type="file" id="uploadImage" accept="image/*">

        <button id="removeBtn">🧹 Remove Background</button>
        <button id="downloadBtn">⬇️ Download PNG</button>

        <div id="status">Upload an image to start</div>

        <canvas id="canvas"></canvas>

    </div>
</div>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let imgLoaded = false;

// LOAD IMAGE
document.getElementById("uploadImage").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            imgLoaded = true;
            document.getElementById("status").innerText = "✅ Image loaded. Click Remove Background";
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
});

// REMOVE BG
document.getElementById("removeBtn").addEventListener("click", function() {
    if (!imgLoaded) {
        alert("Please upload an image first!");
        return;
    }

    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
        // remove white background
        if (data[i] > 200 && data[i+1] > 200 && data[i+2] > 200) {
            data[i+3] = 0;
        }
    }

    ctx.putImageData(imageData, 0, 0);
    document.getElementById("status").innerText = "🎉 Background removed!";
});

// DOWNLOAD
document.getElementById("downloadBtn").addEventListener("click", function() {
    if (!imgLoaded) {
        alert("No image to download!");
        return;
    }

    let link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "wayze-bg-removed.png";
    link.click();
});

</script>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

</body>
</html>
