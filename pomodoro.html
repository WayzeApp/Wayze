<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer - Wayze</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; font-weight:600; }

/* CONTAINER */
.container {
    max-width:500px;
    width:95%;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
    text-align:center;
}

/* TIMER */
#timer {
    font-size:48px;
    font-weight:bold;
    margin:20px 0;
    color:#667eea;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* RESULT */
.info {
    margin-top:10px;
    font-size:14px;
    color:#666;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>⏳ Pomodoro Timer</h2>

<p class="info">Enter minutes and start focus session</p>

<input type="number" id="minutesInput" min="1" max="120" placeholder="Enter minutes">

<div id="timer">00:00</div>

<button onclick="startTimer()">▶️ Start</button>
<button onclick="pauseTimer()">⏸️ Pause</button>
<button onclick="resetTimer()">🔄 Reset</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
let totalSeconds = 0;
let timerInterval = null;

function updateDisplay(){
    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;

    document.getElementById('timer').innerText =
        `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
}

function startTimer(){
    if(timerInterval) return;

    if(totalSeconds === 0){
        const input = parseInt(document.getElementById('minutesInput').value);
        if(isNaN(input) || input < 1){
            alert("Enter valid minutes!");
            return;
        }
        totalSeconds = input * 60;
    }

    timerInterval = setInterval(()=>{
        if(totalSeconds <= 0){
            clearInterval(timerInterval);
            timerInterval = null;
            alert("Pomodoro Completed! 🍅");
            return;
        }
        totalSeconds--;
        updateDisplay();
    }, 1000);
}

function pauseTimer(){
    clearInterval(timerInterval);
    timerInterval = null;
}

function resetTimer(){
    clearInterval(timerInterval);
    timerInterval = null;
    totalSeconds = 0;
    updateDisplay();
}

// init
updateDisplay();
</script>

</body>
</html>
