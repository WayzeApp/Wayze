<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter - Wayze</title>

<style>

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a {
    color:white;
    text-decoration:none;
}

/* MAIN */
.main {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.container {
    width:100%;
    max-width:520px;
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* TEXTAREA */
textarea {
    width:100%;
    height:140px;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:1px solid #ddd;
    resize:none;
    box-sizing:border-box;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
button:hover {
    background:#5a6edc;
}

/* RESULT BOX */
.result {
    margin-top:15px;
    padding:12px;
    background:#f5f7fb;
    border-radius:8px;
    word-wrap:break-word;
    text-align:left;
    font-weight:500;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* MOBILE */
@media(max-width:768px){
    .container {
        margin:0 10px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

    <h2>Case Converter Tool</h2>

    <textarea id="inputText" placeholder="Enter your text here..."></textarea>

    <button onclick="toUpperCaseText()">🔠 UPPERCASE</button>
    <button onclick="toLowerCaseText()">🔡 lowercase</button>
    <button onclick="toTitleCase()">📝 Title Case</button>
    <button onclick="toSentenceCase()">📄 Sentence case</button>
    <button onclick="copyText()">📋 Copy Result</button>
    <button onclick="clearText()">❌ Clear</button>

    <div class="result" id="result">Your result will appear here...</div>

</div>
</div>

<script>

function toUpperCaseText() {
    let text = document.getElementById("inputText").value;
    document.getElementById("result").innerText = text.toUpperCase();
}

function toLowerCaseText() {
    let text = document.getElementById("inputText").value;
    document.getElementById("result").innerText = text.toLowerCase();
}

function toTitleCase() {
    let text = document.getElementById("inputText").value;
    let result = text.toLowerCase().split(" ").map(word => {
        return word.charAt(0).toUpperCase() + word.slice(1);
    }).join(" ");
    document.getElementById("result").innerText = result;
}

function toSentenceCase() {
    let text = document.getElementById("inputText").value.toLowerCase();
    let result = text.charAt(0).toUpperCase() + text.slice(1);
    document.getElementById("result").innerText = result;
}

function copyText() {
    let result = document.getElementById("result").innerText;

    if (!result || result === "Your result will appear here...") {
        alert("No text to copy!");
        return;
    }

    navigator.clipboard.writeText(result);
    alert("Copied to clipboard! ✅");
}

function clearText() {
    document.getElementById("inputText").value = "";
    document.getElementById("result").innerText = "Your result will appear here...";
}

</script>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

</body>
</html>
