<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator - Wayze</title>

<style>

* { box-sizing:border-box; }

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.container {
    width:100%;
    max-width:520px;
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin-top:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* RESULT */
.result {
    margin-top:20px;
    line-height:1.6;
    font-weight:600;
    text-align:left;
}

.highlight {
    color:#667eea;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* MOBILE */
@media(max-width:768px){
    .container { margin:0 10px; }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

<h2>📅 Date Calculator</h2>

<p><b>Calculate Difference Between Dates</b></p>

<input type="date" id="startDate">
<input type="date" id="endDate">

<button onclick="calculateDate()">Calculate</button>

<div class="result" id="result"></div>

</div>
</div>

<script>
function calculateDate() {

    let start = new Date(document.getElementById("startDate").value);
    let end = new Date(document.getElementById("endDate").value);

    if (!start.getTime() || !end.getTime()) {
        document.getElementById("result").innerHTML = "⚠️ Please select valid dates";
        return;
    }

    if (end < start) {
        document.getElementById("result").innerHTML = "⚠️ End date must be after start date";
        return;
    }

    let diffTime = end - start;
    let days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    let years = Math.floor(days / 365);
    let months = Math.floor((days % 365) / 30);
    let remainingDays = (days % 365) % 30;

    document.getElementById("result").innerHTML =
    `📊 <span class="highlight">Result:</span><br><br>
     ${years} Years<br>
     ${months} Months<br>
     ${remainingDays} Days<br>
     <br><b>Total Days: ${days}</b>`;
}
</script>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

</body>
</html>
