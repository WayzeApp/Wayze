<style>
* { box-sizing:border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a { color:white; text-decoration:none; font-weight:600; }

/* CONTAINER */
.container {
    flex:1;
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* RESULT */
.result-box {
    margin-top:15px;
    padding:15px;
    border-radius:8px;
    background:#f4f4f4;
    text-align:center;
    font-weight:bold;
}

.profit { color:green; }
.loss { color:red; }

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container {
        margin:20px 12px;
        padding:20px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>💼 Profit & Margin Calculator</h2>
<p style="color:#666; font-size:14px;">
Calculate profit, loss, margin and markup instantly.
</p>

<input type="number" id="cost" placeholder="Cost Price (₹)">
<input type="number" id="selling" placeholder="Selling Price (₹)">

<button onclick="calculateProfit()">⚡ Calculate</button>

<div class="result-box" id="result"></div>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function calculateProfit() {

    let cost = parseFloat(document.getElementById("cost").value);
    let selling = parseFloat(document.getElementById("selling").value);

    if(isNaN(cost) || cost <= 0 || isNaN(selling) || selling <= 0){
        document.getElementById("result").innerHTML = "Enter valid values!";
        return;
    }

    let profit = selling - cost;
    let margin = (profit / selling) * 100;
    let markup = (profit / cost) * 100;

    let resultHTML = "";

    if(profit > 0){
        resultHTML = `
            <div class="profit">Profit: ₹ ${profit.toFixed(2)}</div>
            Margin: ${margin.toFixed(2)} %<br>
            Markup: ${markup.toFixed(2)} %
        `;
    } else if(profit < 0){
        resultHTML = `
            <div class="loss">Loss: ₹ ${Math.abs(profit).toFixed(2)}</div>
            Loss %: ${Math.abs(markup).toFixed(2)} %
        `;
    } else {
        resultHTML = "No Profit, No Loss";
    }

    document.getElementById("result").innerHTML = resultHTML;
}
</script>

</body>
</html>
