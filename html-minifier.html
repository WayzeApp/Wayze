<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML/CSS/JS Minifier - Wayze</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top:0;
    display:flex;
    justify-content: space-between;
    align-items:center;
    background: #111;
    padding: 15px 20px;
    color:white;
    font-weight:600;
}
.navbar a { color:white; text-decoration:none; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
}

/* CARD */
.container {
    width:100%;
    max-width:700px;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
h2 {
    font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
    margin-bottom:20px;
}

/* TEXTAREA */
textarea {
    width:100%;
    min-height:150px;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ddd;
    font-family: monospace;
    box-sizing:border-box;
    resize: vertical;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
button:hover { background:#5a6edc; }

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:768px){
    .container { margin:0 10px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
   <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

<h2>🖋 HTML / CSS / JS Minifier</h2>

<label>Paste your code here:</label>
<textarea id="inputCode" placeholder="Paste HTML, CSS, or JS code here..."></textarea>

<button onclick="minifyCode()">Minify Code</button>
<button onclick="clearCode()">Clear</button>

<label>Minified Code:</label>
<textarea id="outputCode" placeholder="Minified code will appear here..."></textarea>

</div>
</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<!-- JS -->
<script>
function minifyCode() {
    let code = document.getElementById("inputCode").value;

    if (!code.trim()) {
        alert("Please paste some code to minify.");
        return;
    }

    // Remove comments
    code = code.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g,'');
    // Remove newlines and extra spaces
    code = code.replace(/\n/g, '').replace(/\s+/g,' ');

    document.getElementById("outputCode").value = code.trim();
}

// Clear both textareas
function clearCode() {
    document.getElementById("inputCode").value = "";
    document.getElementById("outputCode").value = "";
    document.getElementById("inputCode").focus(); // auto-focus for new input
}
</script>

</body>
</html>
