<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Base64 - Wayze</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    padding: 15px 20px;
    color: white;
}
.navbar a { color:white; text-decoration:none; font-weight:600; }

/* CONTAINER */
.container {
    max-width: 600px;
    margin: 60px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* INPUTS */
input, textarea, button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 6px;
    font-size: 14px;
}

/* BUTTON STYLE (WAYZE STANDARD) */
button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
}
button:hover { opacity: 0.9; }

/* TEXTAREA */
textarea {
    height: 150px;
    resize: none;
    font-size: 12px;
}

/* IMAGE */
img {
    max-width: 100%;
    margin-top: 15px;
    border-radius: 8px;
}

/* STATUS */
#status {
    margin-top: 10px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin: 20px 15px; padding: 20px; }
    input, textarea, button { font-size:13px; padding:10px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">
<h2>🖼️ Image to Base64</h2>

<label>Select Image</label>
<input type="file" id="uploadImage" accept="image/*">

<img id="preview">

<textarea id="base64Text" placeholder="Base64 string will appear here..."></textarea>

<button id="convertBtn">🔄 Convert to Base64</button>
<button id="copyBtn">📋 Copy Base64</button>

<div id="status"></div>
</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
let base64Data = "";

document.getElementById("uploadImage").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        base64Data = e.target.result;
        document.getElementById("preview").src = base64Data;
        document.getElementById("base64Text").value = "";
        document.getElementById("status").innerText = "Image loaded. Click Convert!";
    };

    reader.readAsDataURL(file);
});

document.getElementById("convertBtn").addEventListener("click", function() {
    if (!base64Data) {
        alert("Please upload an image first!");
        return;
    }

    document.getElementById("base64Text").value = base64Data;
    document.getElementById("status").innerText = "✅ Conversion done!";
});

document.getElementById("copyBtn").addEventListener("click", function() {
    const textArea = document.getElementById("base64Text");
    if (!textArea.value) {
        alert("Nothing to copy!");
        return;
    }

    textArea.select();
    textArea.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(textArea.value);
    document.getElementById("status").innerText = "📋 Copied to clipboard!";
});
</script>

</body>
</html>
