<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    padding: 15px 20px;
    color: white;
}
.navbar a {
    color: white;
    text-decoration: none;
    font-weight: 600;
}

/* CONTAINER */
.container {
    max-width: 500px;
    margin: 60px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    margin-top: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    resize: none;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    font-size: 16px;
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
}
button:hover {
    background:#5a6edc;
}

/* RESULT BOX */
.result {
    margin-top: 15px;
    padding: 12px;
    background: #f4f4f4;
    border-radius: 8px;
    font-weight: 500;
    word-wrap: break-word;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin: 20px 15px; padding: 20px; }
    textarea { font-size:14px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

    <h2>✏️ Paraphraser & Summarizer</h2>

    <textarea id="inputText" placeholder="Enter your text here..."></textarea>

    <button onclick="paraphraseText()">✏️ Paraphrase</button>
    <button onclick="summarizeText()">📄 Summarize</button>
    <button onclick="copyText()">📋 Copy Result</button>
    <button onclick="clearText()">❌ Clear</button>

    <div class="result" id="result"></div>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>

// Synonyms dictionary
const synonyms = {
    "quick": "fast",
    "happy": "joyful",
    "big": "large",
    "important": "essential",
    "learn": "study",
    "world": "planet",
    "technology": "tech"
};

function paraphraseText() {
    let text = document.getElementById("inputText").value;

    if (!text) {
        document.getElementById("result").innerText = "Enter text first";
        return;
    }

    let words = text.split(" ");
    let newText = words.map(word => {
        let clean = word.toLowerCase();
        return synonyms[clean] ? synonyms[clean] : word;
    });

    document.getElementById("result").innerText = newText.join(" ");
}

function summarizeText() {
    let text = document.getElementById("inputText").value;

    if (!text) {
        document.getElementById("result").innerText = "Enter text first";
        return;
    }

    let sentences = text.split(".");
    let summary = sentences.slice(0, 3).join(".");

    document.getElementById("result").innerText = summary + ".";
}

function copyText() {
    let result = document.getElementById("result").innerText;

    if (!result) {
        alert("Nothing to copy!");
        return;
    }

    navigator.clipboard.writeText(result);
}

function clearText() {
    document.getElementById("inputText").value = "";
    document.getElementById("result").innerText = "";
}

</script>

</body>
</html>
