<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Name Generator - Wayze</title>

<style>

/* BODY */
body {
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */
.navbar {
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}
.navbar a {
    color:white;
    text-decoration:none;
}

/* MAIN */
.main {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* CARD */
.container {
    width:100%;
    max-width:650px;
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* INPUT */
input, select {
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    border:none;
    background:#667eea;
    color:white;
    cursor:pointer;
    font-weight:600;
}
button:hover {
    background:#5a6edc;
}

/* NAME LIST */
.name-list {
    margin-top:20px;
}

.name-item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    margin-bottom:8px;
    background:#f5f7fb;
    border-radius:8px;
}

.name-item span {
    font-weight:500;
}

/* COPY BUTTON */
.copy-btn {
    background:#28a745;
    width:auto;
    padding:6px 12px;
    font-size:14px;
}
.copy-btn:hover {
    background:#218838;
}

/* STATUS */
.status {
    margin-top:10px;
    font-size:14px;
    font-weight:600;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* MOBILE */
@media(max-width:768px){
    .container {
        margin:0 10px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

    <h2>💡 Business Name Generator</h2>

    <input type="text" id="keyword" placeholder="Enter keyword (optional)">

    <select id="category">
        <option value="">-- Select Industry Category --</option>
        <option value="tech">Tech</option>
        <option value="food">Food</option>
        <option value="fashion">Fashion</option>
        <option value="finance">Finance</option>
        <option value="health">Health</option>
        <option value="education">Education</option>
    </select>

    <button onclick="generateNames()">Generate Names</button>

    <div class="status" id="status"></div>

    <div class="name-list" id="nameList"></div>

</div>
</div>

<script>

const wordBank = {
    tech: ["Tech","Digital","Cloud","AI","Data","Cyber","Pixel","Logic","Quantum"],
    food: ["Taste","Bite","Spice","Delish","Flavor","Harvest","Fresh","Yum"],
    fashion: ["Style","Chic","Trend","Glam","Wear","Vogue","Aura","Elegance"],
    finance: ["Capital","Wealth","Fund","Invest","Ledger","Vault","Growth","Secure"],
    health: ["Vital","Well","Fit","Care","Life","Heal","Balance","Pure"],
    education: ["Learn","Skill","Academy","Knowledge","Tutor","Scholar"],
    default: ["Pro","Hub","Solutions","Works","Zone","World","Lab","Point","Sphere"]
};

function generateNames(){
    const keyword = document.getElementById('keyword').value.trim();
    const category = document.getElementById('category').value;

    const names = new Set();
    const bank = category 
        ? [...wordBank[category], ...wordBank.default]
        : Object.values(wordBank).flat();

    while(names.size < 10){
        let word1 = bank[Math.floor(Math.random()*bank.length)];
        let word2 = bank[Math.floor(Math.random()*bank.length)];

        let name = keyword 
            ? `${keyword} ${word1}` 
            : `${word1} ${word2}`;

        names.add(name);
    }

    displayNames([...names]);
    document.getElementById("status").innerText = "✅ Names generated!";
}

function displayNames(names){
    const listDiv = document.getElementById('nameList');
    listDiv.innerHTML = "";

    names.forEach(name=>{
        const div = document.createElement('div');
        div.className = "name-item";
        div.innerHTML = `
            <span>${name}</span>
            <button class="copy-btn" onclick="copyName('${name}')">Copy</button>
        `;
        listDiv.appendChild(div);
    });
}

function copyName(name){
    navigator.clipboard.writeText(name);
    document.getElementById("status").innerText = `📋 Copied: ${name}`;
}

</script>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

</body>
</html>
