<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}

.navbar a {
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* CONTAINER */
.container {
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TEXTAREA */
textarea {
    width:100%;
    padding:10px;
    margin-top:12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-family:monospace;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}

button:hover {
    background:#5a6edc;
}

/* RESULT */
.result {
    margin-top:15px;
    border:1px solid #ccc;
    padding:12px;
    border-radius:6px;
    background:#f5f5f5;
    word-break:break-word;
    font-family:monospace;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="../tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>🔗 URL Encoder / Decoder</h2>

<textarea id="inputText" rows="5" placeholder="Enter text or URL"></textarea>

<button onclick="encodeURL()">Encode URL</button>
<button onclick="decodeURL()">Decode URL</button>

<div class="result" id="output">Result will appear here...</div>

<button onclick="copyResult()">Copy Result</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function encodeURL() {
    let text = document.getElementById("inputText").value;
    if (!text) {
        document.getElementById("output").innerText = "Enter some text!";
        return;
    }
    document.getElementById("output").innerText = encodeURIComponent(text);
}

function decodeURL() {
    let text = document.getElementById("inputText").value;
    if (!text) {
        document.getElementById("output").innerText = "Enter some text!";
        return;
    }
    try {
        document.getElementById("output").innerText = decodeURIComponent(text);
    } catch(e) {
        document.getElementById("output").innerText = "❌ Invalid encoded URL!";
    }
}

function copyResult() {
    const res = document.getElementById("output").innerText;

    if (!res || res.includes("appear")) {
        alert("Nothing to copy!");
        return;
    }

    navigator.clipboard.writeText(res);
    alert("Copied!");
}
</script>

</body>
</html>
