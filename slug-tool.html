<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slug Generator - Wayze</title>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BBC2377YZF"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-BBC2377YZF');

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* BODY */
body {
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:15px 20px;
    color:white;
}

.navbar a {
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* CONTAINER */
.container {
    max-width:600px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TEXTAREA */
textarea {
    width:100%;
    min-height:150px;
    margin-top:12px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* TABLE */
table {
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
}

th, td {
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
    word-break:break-all;
}

/* BUTTON */
button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-size:16px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:600;
}

button:hover {
    background:#5a6edc;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:12px;
    color:white;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-weight:600;
    margin-top:auto;
}

/* PRINT */
.print-area { margin-top:15px; }
.print-title { display:none; }

@media print {
    body * { visibility:hidden; }
    .print-area, .print-area * { visibility:visible; }
    .print-area { position:absolute; top:0; left:0; width:100%; padding:10px; }
    .print-title { display:block; text-align:center; font-size:22px; font-weight:bold; margin-bottom:15px; }
    textarea, button, .no-print, .navbar, .footer { display:none !important; }
}

/* MOBILE */
@media(max-width:480px){
    .container { margin:20px 15px; padding:20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>⚡ Wayze</div>
    <div><a href="tools.html">Home</a></div>
</div>

<!-- MAIN -->
<div class="container">

<h2>🔗 Slug Generator</h2>

<textarea id="inputText" placeholder="Enter your text here..." oninput="generateSlug()"></textarea>

<div class="print-area">
<h2 class="print-title">Slug Report</h2>

<table>
<thead>
<tr>
<th>Details</th>
<th>Value</th>
</tr>
</thead>
<tbody id="resultTable">
<tr><td>Slug</td><td>Your slug will appear here...</td></tr>
</tbody>
</table>
</div>

<button class="no-print" onclick="copyText()">Copy Slug</button>
<button class="no-print" onclick="clearText()">Clear</button>
<button class="no-print" onclick="window.print()">Print / Save PDF</button>

</div>

<!-- FOOTER -->
<div class="footer">© 2026 Wayze</div>

<script>
function generateSlug(){
    let text = document.getElementById("inputText").value;

    let slug = text
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\s-]/g,'')
        .replace(/\s+/g,'-')
        .replace(/-+/g,'-');

    document.getElementById("resultTable").innerHTML = `
        <tr><td>Original Text</td><td>${text || '-'}</td></tr>
        <tr><td><b>Generated Slug</b></td><td><b>${slug || '-'}</b></td></tr>
    `;
}

function clearText(){
    document.getElementById("inputText").value = "";
    document.getElementById("resultTable").innerHTML = `
        <tr><td>Slug</td><td>Your slug will appear here...</td></tr>
    `;
}

function copyText(){
    let table = document.getElementById("resultTable");

    if(!table.innerText || table.innerText.includes("appear here")){
        alert("Nothing to copy!");
        return;
    }

    let slug = table.rows[1].cells[1].innerText;
    navigator.clipboard.writeText(slug);
    alert("Slug copied!");
}
</script>

</body>
</html>
